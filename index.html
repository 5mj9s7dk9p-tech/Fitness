const MUSCLE_COLORS={Quads:"#f59e0b",Glutes:"#ef4444",Hamstrings:"#f97316","Lower Back":"#8b5cf6","Upper Back":"#a78bfa",Traps:"#7c3aed",Lats:"#3b82f6",Core:"#06b6d4",Shoulders:"#10b981",Triceps:"#84cc16",Biceps:"#22c55e",Chest:"#ec4899"};

const STORAGE_KEY="traininghq_v2";

const SEED=[
  {id:101,date:"2024-06-10",type:"Benchmark",name:"CrossFit Total",notes:"BS + SP + DL. PR by 45 lbs vs 875.",result:"920 lbs (PR)",rpe:9,energy:2,bodyweight:null,movements:[{name:"Back Squat",sets:[{reps:1,weight:355}]},{name:"Strict Press",sets:[{reps:1,weight:160}]},{name:"Deadlift",sets:[{reps:1,weight:405}]}]},
  {id:102,date:"2024-02-09",type:"Benchmark",name:"Open 18.2A",notes:"1RM C&J power style. PR by 70 lbs.",result:"255 lbs (PR)",rpe:9,energy:3,bodyweight:null,movements:[{name:"Power Clean",sets:[{reps:1,weight:255}]}]},
  {id:103,date:"2023-12-13",type:"Strength",name:"Snatch 1RM",notes:"Squat snatch. PR by 20 lbs vs 185.",result:"205 lbs (PR)",rpe:9,energy:3,bodyweight:null,movements:[{name:"Snatch",sets:[{reps:1,weight:205}]}]},

  {id:107,date:"2022-08-29",type:"Benchmark",name:"Fran",notes:"21-15-9 Thrusters (95) + Pull-ups. PR by 1:22.",result:"4:07 (PR)",rpe:10,energy:1,bodyweight:null,movements:[{name:"Thrusters",sets:[{reps:21,weight:95},{reps:15,weight:95},{reps:9,weight:95}]},{name:"Pull-ups",sets:[{reps:21},{reps:15},{reps:9}]}]},
  {id:114,date:"2022-02-07",type:"Benchmark",name:"Nasty Girls",notes:"PR by 0:52 vs 6:44.",result:"5:52 (PR)",rpe:9,energy:2,bodyweight:null,movements:[]},
];

  "Squat Snatch":{weight:202,date:"2023-11-29",note:"1RM"},
  "Power Snatch":{weight:185,date:"2022-04-12",note:"1RM"},
  "Clean & Jerk":{weight:225,date:"2022-07-15",note:"1RM"},

  "Power Clean":{weight:265,date:"2024-05-10",note:"1RM"},
  "Split Jerk":{weight:225,date:"2023-08-30",note:"1RM"},
  "Back Squat":{weight:365,date:"2026-03-07",note:"1RM"},

  "Overhead Squat":{weight:245,date:"2023-11-06",note:"1RM"},
  "Deadlift":{weight:445,date:"2023-09-27",note:"1RM"},

  "Strict Press":{weight:160,date:"2023-10-04",note:"1RM"},
  "Push Press":{weight:225,date:"2024-07-26",note:"1RM"},
  "Thruster":{weight:195,date:"2024-02-12",note:"2RM"},
  "Fran":{weight:null,date:"2022-08-29",note:"4:07"},
  "CrossFit Total":{weight:920,date:"2024-06-10",note:"355+160+405"},

const load=()=>{try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return SEED;};
const save=(w)=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(w));}catch(e){}};

const rpeColor=(r)=>r<=4?"#22c55e":r<=6?"#84cc16":r<=7?"#eab308":r<=8?"#f97316":"#ef4444";

const fmtDate=(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtDateLong=(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
const fmtDatePR=(d)=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

function RPEGauge({value}){
  const pct=value/10,r=26,c=2*Math.PI*r,col=rpeColor(value);
  return html`<div style=${{position:"relative",width:64,height:64}}>
    <svg width=64 height=64 viewBox="0 0 64 64">
      <circle cx=32 cy=32 r=${r} fill=none stroke="#1c1c1e" stroke-width=5/>
      <circle cx=32 cy=32 r=${r} fill=none stroke=${col} stroke-width=5
        stroke-dasharray="${c*pct} ${c*(1-pct)}"
        stroke-dashoffset=${c*0.25} stroke-linecap=round/>
    </svg>
    <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <span style=${{fontSize:16,fontWeight:900,color:col,fontFamily:"monospace"}}>${value}</span>
      <span style=${{fontSize:7,color:"#6b7280",letterSpacing:1}}>RPE</span>
    </div>
  </div>`;
}

function WeekStrip({workouts}){
  const today=new Date(),mon=new Date(today);
  mon.setDate(today.getDate()-((today.getDay()+6)%7));
  return html`<div style=${{display:"flex",gap:6}}>
    ${["M","T","W","T","F","S","S"].map((d,i)=>{
      const dt=new Date(mon);dt.setDate(mon.getDate()+i);
      const ds=dt.toISOString().slice(0,10);
      const w=workouts.find(x=>x.date===ds);
      const isToday=ds===today.toISOString().slice(0,10);
      return html`<div key=${i} style=${{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
        <span style=${{fontSize:10,color:isToday?"#f59e0b":"#6b7280",fontFamily:"monospace",fontWeight:700}}>${d}</span>
        <div style=${{width:34,height:34,borderRadius:8,background:w?rpeColor(w.rpe):"#1c1c1e",border:isToday?"2px solid #f59e0b":"1px solid #2a2a2e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:w?"#000":"#444",fontWeight:800}}>
          ${w?w.rpe:"·"}
        </div>
      </div>`;
    })}
  </div>`;
}

function StatCard({label,value,sub,accent}){
  return html`<div style=${{background:"#111113",border:"1px solid #222226",borderRadius:12,padding:"12px 14px",display:"flex",flexDirection:"column",gap:3,position:"relative",overflow:"hidden"}}>
    <div style=${{position:"absolute",top:0,left:0,right:0,height:2,background:accent||"#f59e0b",borderRadius:"12px 12px 0 0"}}/>
    <span style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace"}}>${label}</span>
    <span style=${{fontSize:20,fontWeight:900,color:"#f5f5f5",lineHeight:1}}>${value}</span>
    ${sub&&html`<span style=${{fontSize:10,color:"#4b5563"}}>${sub}</span>`}
  </div>`;
}

function WorkoutCard({workout,onClick}){
  const vol=workout.movements.reduce((a,m)=>a+m.sets.reduce((b,s)=>b+(parseFloat(s.reps||0)*parseFloat(s.weight||0)),0),0);
  return html`<div onClick=${()=>onClick(workout)} style=${{background:"#111113",border:"1px solid #222226",borderRadius:14,padding:"16px 18px",cursor:"pointer",display:"flex",flexDirection:"column",gap:10}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style=${{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
          <span style=${{fontSize:9,fontWeight:800,letterSpacing:2,textTransform:"uppercase",background:"#1e1a12",color:"#f59e0b",padding:"2px 7px",borderRadius:4,fontFamily:"monospace"}}>${workout.type}</span>
          <span style=${{fontSize:11,color:"#4b5563",fontFamily:"monospace"}}>${fmtDate(workout.date)}</span>
        </div>
        <div style=${{fontSize:16,fontWeight:800,color:"#f5f5f5",letterSpacing:-0.3}}>${workout.name}</div>
      </div>
      <${RPEGauge} value=${workout.rpe}/>
    </div>
    <p style=${{fontSize:12,color:"#6b7280",margin:0,lineHeight:1.5}}>${workout.notes}</p>
    <div style=${{display:"flex",gap:16,paddingTop:8,borderTop:"1px solid #1c1c1e"}}>
      <div><div style=${{fontSize:9,color:"#4b5563",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>Result</div><div style=${{fontSize:13,fontWeight:700,color:"#f59e0b"}}>${workout.result}</div></div>
      ${vol>0&&html`<div><div style=${{fontSize:9,color:"#4b5563",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>Volume</div><div style=${{fontSize:13,fontWeight:700,color:"#e5e7eb"}}>${vol.toLocaleString()} lbs</div></div>`}
      <div><div style=${{fontSize:9,color:"#4b5563",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>Feel</div><div style=${{fontSize:13,fontWeight:700,color:"#e5e7eb"}}>${ENERGY_LABELS[workout.energy]}</div></div>
    </div>
  </div>`;
}

function SetRow({set,idx,onChange}){
  return html`<div style=${{display:"flex",gap:8,alignItems:"center"}}>
    <span style=${{fontSize:11,color:"#4b5563",fontFamily:"monospace",width:16}}>${idx+1}</span>
    <input type=number placeholder=Reps value=${set.reps||""} onInput=${e=>onChange({...set,reps:e.target.value})}
      style=${{width:64,padding:"6px 8px",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:6,color:"#f5f5f5",fontSize:14,fontFamily:"monospace"}}/>
    <input type=number placeholder=lbs value=${set.weight||""} onInput=${e=>onChange({...set,weight:e.target.value})}
      style=${{width:72,padding:"6px 8px",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:6,color:"#f5f5f5",fontSize:14,fontFamily:"monospace"}}/>
    <span style=${{fontSize:11,color:"#4b5563"}}>lbs</span>
  </div>`;
}

function LogForm({onSave,onCancel}){
  const[form,setForm]=useState({date:new Date().toISOString().slice(0,10),type:"For Time",name:"",notes:"",result:"",rpe:7,energy:2,bodyweight:"",movements:[]});
  const[newMov,setNewMov]=useState("");
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const addMov=()=>{if(!newMov)return;setForm(f=>({...f,movements:[...f.movements,{name:newMov,sets:[{reps:"",weight:""}]}]}));setNewMov("");};
  const updSet=(mi,si,v)=>setForm(f=>({...f,movements:f.movements.map((m,i)=>i!==mi?m:{...m,sets:m.sets.map((s,j)=>j!==si?s:v)})}));
  const addSet=mi=>setForm(f=>({...f,movements:f.movements.map((m,i)=>i!==mi?m:{...m,sets:[...m.sets,{reps:"",weight:""}]})}));
  const remMov=mi=>setForm(f=>({...f,movements:f.movements.filter((_,i)=>i!==mi)}));
  const s={padding:"9px 10px",background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:8,color:"#f5f5f5",fontSize:13,width:"100%"};
  return html`<div style=${{background:"#0d0d0f",border:"1px solid #2a2a2e",borderRadius:16,padding:20,display:"flex",flexDirection:"column",gap:16}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style=${{fontSize:18,fontWeight:900,color:"#f5f5f5"}}>Log Workout</div>
      <button onClick=${onCancel} style=${{background:"none",border:"none",color:"#6b7280",fontSize:22,cursor:"pointer"}}>✕</button>
    </div>
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:5}}>Date</div>
        <input type=date value=${form.date} onInput=${e=>upd("date",e.target.value)} style=${s}/>
      </div>
      <div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:5}}>Type</div>
        <select value=${form.type} onChange=${e=>upd("type",e.target.value)} style=${s}>
          ${WOD_TYPES.map(t=>html`<option key=${t}>${t}</option>`)}
        </select>
      </div>
      <div style=${{gridColumn:"1/-1"}}>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:5}}>Workout Name</div>
        <input value=${form.name} onInput=${e=>upd("name",e.target.value)} placeholder="e.g. Fran, Tuesday WOD" style=${s}/>
      </div>
      <div style=${{gridColumn:"1/-1"}}>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:5}}>Notes</div>
        <textarea value=${form.notes} onInput=${e=>upd("notes",e.target.value)} rows=3 style=${{...s,resize:"vertical"}}/>
      </div>
      <div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:5}}>Result</div>
        <input value=${form.result} onInput=${e=>upd("result",e.target.value)} placeholder="4:32 / 9 rounds" style=${s}/>
      </div>
      <div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:5}}>Body Weight</div>
        <input type=number value=${form.bodyweight} onInput=${e=>upd("bodyweight",e.target.value)} placeholder=lbs style=${s}/>
      </div>
    </div>
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:6}}>RPE — <span style=${{color:rpeColor(form.rpe)}}>${form.rpe}/10</span></div>
        <input type=range min=1 max=10 value=${form.rpe} onInput=${e=>upd("rpe",+e.target.value)} style=${{accentColor:rpeColor(form.rpe)}}/>
        <div style=${{display:"flex",justifyContent:"space-between",fontSize:9,color:"#4b5563",fontFamily:"monospace",marginTop:2}}><span>Easy</span><span>Max</span></div>
      </div>
      <div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:6}}>Feel — <span style=${{color:"#f59e0b"}}>${ENERGY_LABELS[form.energy]}</span></div>
        <div style=${{display:"flex",gap:4}}>
          ${ENERGY_LABELS.map((_,i)=>html`<button key=${i} onClick=${()=>upd("energy",i)}
            style=${{flex:1,padding:"8px 0",border:"1px solid",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700,
              borderColor:form.energy===i?RPE_COLORS[i]:"#2a2a2e",
              background:form.energy===i?RPE_COLORS[i]+"22":"#1a1a1e",
              color:form.energy===i?RPE_COLORS[i]:"#4b5563"}}>${i+1}</button>`)}
        </div>
      </div>
    </div>
    <div>
      <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:10}}>Movements & Sets</div>
      ${form.movements.map((m,mi)=>html`<div key=${mi} style=${{background:"#111113",border:"1px solid #1e1e22",borderRadius:10,padding:12,marginBottom:10,display:"flex",flexDirection:"column",gap:8}}>
        <div style=${{display:"flex",justifyContent:"space-between"}}>
          <span style=${{fontSize:13,fontWeight:700,color:"#f59e0b"}}>${m.name}</span>
          <button onClick=${()=>remMov(mi)} style=${{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        ${m.sets.map((set,si)=>html`<${SetRow} key=${si} set=${set} idx=${si} onChange=${v=>updSet(mi,si,v)}/>`)}
        <button onClick=${()=>addSet(mi)} style=${{background:"none",border:"1px dashed #2a2a2e",borderRadius:6,color:"#4b5563",padding:"6px",fontSize:11,cursor:"pointer"}}>+ Add Set</button>
      </div>`)}
      <div style=${{display:"flex",gap:8}}>
        <select value=${newMov} onChange=${e=>setNewMov(e.target.value)} style=${{...s,color:newMov?"#f5f5f5":"#4b5563",flex:1}}>
          <option value="">— Select movement —</option>
          ${Object.entries(MOVEMENTS).map(([cat,moves])=>html`<optgroup key=${cat} label=${cat}>
            ${moves.map(m=>html`<option key=${m}>${m}</option>`)}
          </optgroup>`)}
        </select>
        <button onClick=${addMov} style=${{padding:"9px 16px",background:"#f59e0b",border:"none",borderRadius:8,color:"#000",fontWeight:800,fontSize:13,cursor:"pointer"}}>Add</button>
      </div>
    </div>
    <button onClick=${()=>onSave({...form,id:Date.now()})} style=${{padding:14,background:"#f59e0b",border:"none",borderRadius:10,color:"#000",fontWeight:900,fontSize:15,cursor:"pointer"}}>
      Save Workout
    </button>
  </div>`;
}

function PRBoard(){
  return html`<div style=${{display:"flex",flexDirection:"column",gap:8}}>
    ${Object.entries(INITIAL_PRS).map(([mov,pr])=>html`
      <div key=${mov} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#111113",border:"1px solid #1e1e22",borderRadius:10}}>
        <div>
          <div style=${{fontSize:13,fontWeight:700,color:"#f5f5f5"}}>${mov}</div>
          <div style=${{fontSize:10,color:"#4b5563",fontFamily:"monospace"}}>${fmtDatePR(pr.date)} ${pr.note&&pr.weight?"· "+pr.note:""}</div>
        </div>
        <div style=${{textAlign:"right"}}>
          ${pr.weight
            ?html`<span style=${{fontSize:18,fontWeight:900,color:"#f59e0b",fontFamily:"monospace"}}>${pr.weight}</span><span style=${{fontSize:11,color:"#6b7280",marginLeft:3}}>lbs</span>`
            :html`<span style=${{fontSize:15,fontWeight:800,color:"#f59e0b",fontFamily:"monospace"}}>${pr.note}</span>`}
        </div>
      </div>`)}
  </div>`;
}

function RadarChart({data}){
  const cx=130,cy=120,maxR=90,N=data.length;
  if(!N)return null;
  const pts=data.map((_,i)=>{
    const a=(2*Math.PI*i/N)-Math.PI/2;
    return{a,lx:cx+maxR*Math.cos(a),ly:cy+maxR*Math.sin(a),
      tx:cx+(maxR+20)*Math.cos(a),ty:cy+(maxR+20)*Math.sin(a)};
  });
  const grid=[0.25,0.5,0.75,1].map(r=>pts.map(p=>`${cx+r*maxR*Math.cos(p.a)},${cy+r*maxR*Math.sin(p.a)}`).join(" "));
  const shape=data.map((d,i)=>{const p=pts[i];const v=(d.val/100)*maxR;return`${cx+v*Math.cos(p.a)},${cy+v*Math.sin(p.a)}`;}).join(" ");
  return html`<svg width=260 height=240 viewBox="0 0 260 240">
    ${grid.map((g,i)=>html`<polygon key=${i} points=${g} fill=none stroke="#1e1e22" stroke-width=1/>`)}
    ${pts.map((p,i)=>html`<line key=${i} x1=${cx} y1=${cy} x2=${p.lx} y2=${p.ly} stroke="#1e1e22" stroke-width=1/>`)}
    <polygon points=${shape} fill="#f59e0b" fill-opacity=0.15 stroke="#f59e0b" stroke-width=2/>
    ${data.map((d,i)=>html`<text key=${i} x=${pts[i].tx} y=${pts[i].ty} text-anchor=middle dominant-baseline=middle
      fill="#6b7280" font-size=9 font-family=monospace>${d.muscle}</text>`)}
  </svg>`;
}

function MuscularLoad({workouts}){
  const[range,setRange]=useState("all");
  const now=new Date(),cut=new Date(now);
  if(range==="7d")cut.setDate(now.getDate()-7);
  else if(range==="30d")cut.setDate(now.getDate()-30);
  else if(range==="90d")cut.setDate(now.getDate()-90);
  else cut.setFullYear(2000);
  const filtered=workouts.filter(w=>new Date(w.date+"T12:00:00")>=cut);
  const totals={};
  filtered.forEach(w=>w.movements.forEach(m=>{
    const map=MUSCLE_MAP[m.name];if(!map)return;
    const vol=m.sets.reduce((a,s)=>a+(parseFloat(s.reps||0)*parseFloat(s.weight||1)),0);
    Object.entries(map).forEach(([mu,pct])=>{totals[mu]=(totals[mu]||0)+vol*pct/100;});
  }));
  const maxV=Math.max(...Object.values(totals),1);
  const bars=Object.entries(totals).sort((a,b)=>b[1]-a[1]).map(([m,v])=>({muscle:m,val:Math.round(v),pct:Math.round(v/maxV*100)}));
  const radarData=bars.map(b=>({muscle:b.muscle,val:b.pct}));
  const total=bars.reduce((a,b)=>a+b.val,0);
  return html`<div style=${{display:"flex",flexDirection:"column",gap:14}}>
    <div style=${{display:"flex",gap:5}}>
      ${[["7d","7d"],["30d","30d"],["90d","90d"],["all","All"]].map(([v,l])=>html`
        <button key=${v} onClick=${()=>setRange(v)} style=${{flex:1,padding:"8px 0",border:"1px solid",borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:800,
          borderColor:range===v?"#f59e0b":"#2a2a2e",background:range===v?"#1e1a12":"#111113",color:range===v?"#f59e0b":"#4b5563"}}>${l}</button>`)}
    </div>
    ${!total?html`<div style=${{textAlign:"center",padding:"40px 0",color:"#4b5563",fontSize:13}}>No movement data yet.<br/>Log sets & reps to see load.</div>`
    :html`<${Fragment}>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style=${{background:"#111113",border:"1px solid #1e1e22",borderRadius:12,padding:"12px 14px"}}>
          <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace"}}>Most Loaded</div>
          <div style=${{fontSize:18,fontWeight:900,color:"#f59e0b",marginTop:2}}>${bars[0]?.muscle}</div>
          <div style=${{fontSize:10,color:"#4b5563"}}>${bars[0]?.val.toLocaleString()} lbs vol</div>
        </div>
        <div style=${{background:"#111113",border:"1px solid #1e1e22",borderRadius:12,padding:"12px 14px"}}>
          <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace"}}>Sessions</div>
          <div style=${{fontSize:18,fontWeight:900,color:"#f5f5f5",marginTop:2}}>${filtered.length}</div>
          <div style=${{fontSize:10,color:"#4b5563"}}>${bars.length} muscle groups</div>
        </div>
      </div>
      <div style=${{background:"#111113",border:"1px solid #1e1e22",borderRadius:14,padding:14,display:"flex",justifyContent:"center"}}>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:8}}>Load Distribution</div>
        <${RadarChart} data=${radarData}/>
      </div>
      <div style=${{background:"#111113",border:"1px solid #1e1e22",borderRadius:14,padding:14}}>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:12}}>Volume by Muscle</div>
        ${bars.map(({muscle,val,pct})=>html`
          <div key=${muscle} style=${{marginBottom:10}}>
            <div style=${{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style=${{fontSize:12,fontWeight:700,color:"#e5e7eb"}}>${muscle}</span>
              <span style=${{fontSize:11,fontFamily:"monospace",color:MUSCLE_COLORS[muscle]||"#f59e0b"}}>${val.toLocaleString()} lbs</span>
            </div>
            <div style=${{height:5,background:"#1a1a1e",borderRadius:3,overflow:"hidden"}}>
              <div style=${{height:"100%",width:pct+"%",background:MUSCLE_COLORS[muscle]||"#f59e0b",borderRadius:3}}/>
            </div>
          </div>`)}
      </div>
    <//>` }
  </div>`;
}

function DetailView({workout,onBack}){
  const vol=workout.movements.reduce((a,m)=>a+m.sets.reduce((b,s)=>b+(parseFloat(s.reps||0)*parseFloat(s.weight||0)),0),0);
  return html`<div>
    <button onClick=${onBack} style=${{background:"none",border:"none",color:"#f59e0b",cursor:"pointer",fontSize:13,fontWeight:700,marginBottom:14,padding:0}}>← Back</button>
    <div style=${{background:"#111113",border:"1px solid #222226",borderRadius:14,padding:18}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <span style=${{fontSize:9,fontWeight:800,letterSpacing:2,textTransform:"uppercase",background:"#1e1a12",color:"#f59e0b",padding:"2px 7px",borderRadius:4,fontFamily:"monospace"}}>${workout.type}</span>
          <div style=${{fontSize:20,fontWeight:900,color:"#f5f5f5",margin:"8px 0 0",letterSpacing:-0.5}}>${workout.name}</div>
          <div style=${{fontSize:10,color:"#4b5563",fontFamily:"monospace",marginTop:2}}>${fmtDateLong(workout.date)}</div>
        </div>
        <${RPEGauge} value=${workout.rpe}/>
      </div>
      <p style=${{fontSize:13,color:"#9ca3af",lineHeight:1.6,marginBottom:14}}>${workout.notes}</p>
      <div style=${{display:"flex",gap:20,paddingTop:12,borderTop:"1px solid #1c1c1e",marginBottom:16}}>
        <div><div style=${{fontSize:9,color:"#4b5563",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>Result</div><div style=${{fontSize:17,fontWeight:800,color:"#f59e0b"}}>${workout.result}</div></div>
        <div><div style=${{fontSize:9,color:"#4b5563",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>Feel</div><div style=${{fontSize:17,fontWeight:800,color:"#e5e7eb"}}>${ENERGY_LABELS[workout.energy]}</div></div>
        ${workout.bodyweight&&html`<div><div style=${{fontSize:9,color:"#4b5563",letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>BW</div><div style=${{fontSize:17,fontWeight:800,color:"#e5e7eb"}}>${workout.bodyweight} lbs</div></div>`}
      </div>
      ${workout.movements.length>0&&html`<div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:10}}>Sets & Reps</div>
        ${workout.movements.map((m,mi)=>html`<div key=${mi} style=${{marginBottom:12}}>
          <div style=${{fontSize:13,fontWeight:700,color:"#f59e0b",marginBottom:5}}>${m.name}</div>
          <div style=${{display:"flex",flexWrap:"wrap",gap:5}}>
            ${m.sets.map((s,si)=>html`<div key=${si} style=${{background:"#1a1a1e",border:"1px solid #2a2a2e",borderRadius:6,padding:"4px 10px",fontFamily:"monospace",fontSize:12,color:"#e5e7eb"}}>
              ${s.reps?s.reps+" reps":""}${s.weight?" @ "+s.weight+"lbs":""}
            </div>`)}
          </div>
        </div>`)}
      </div>`}
    </div>
  </div>`;
}

function App(){
  const[workouts,setWorkouts]=useState(()=>load());
  const[view,setView]=useState("log");
  const[logging,setLogging]=useState(false);
  const[detail,setDetail]=useState(null);
  useEffect(()=>save(workouts),[workouts]);

  const today=new Date(),mon=new Date(today);
  mon.setDate(today.getDate()-((today.getDay()+6)%7));
  const week=workouts.filter(w=>{const d=new Date(w.date+"T12:00:00");return d>=mon&&d<=today;});
  const avgRpe=week.length?(week.reduce((a,b)=>a+b.rpe,0)/week.length).toFixed(1):"—";
  const vol7=workouts.filter(w=>new Date(w.date+"T12:00:00")>=new Date(Date.now()-7*864e5))
    .reduce((a,w)=>a+w.movements.reduce((b,m)=>b+m.sets.reduce((c,s)=>c+(parseFloat(s.reps||0)*parseFloat(s.weight||0)),0),0),0);
  const sorted=[...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const handleSave=w=>{setWorkouts(p=>[w,...p]);setLogging(false);};
  const NAV=[["log","Log"],["prs","PRs"],["load","Load"],["moves","Moves"]];

  return html`<div style=${{minHeight:"100vh",background:"#0a0a0c",color:"#f5f5f5"}}>
    <div style=${{position:"sticky",top:0,zIndex:50,background:"rgba(10,10,12,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid #1a1a1e",padding:"12px 16px",paddingTop:"calc(12px + env(safe-area-inset-top))",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style=${{fontSize:9,color:"#f59e0b",letterSpacing:3,textTransform:"uppercase",fontFamily:"monospace",fontWeight:700}}>CrossFit Log</div>
        <div style=${{fontSize:18,fontWeight:900,color:"#f5f5f5",letterSpacing:-0.5}}>TRAINING HQ</div>
      </div>
      <button onClick=${()=>{setLogging(true);setDetail(null);}} style=${{padding:"8px 14px",background:"#f59e0b",border:"none",borderRadius:8,color:"#000",fontWeight:800,fontSize:13,cursor:"pointer"}}>+ Log WOD</button>
    </div>

    <div style=${{maxWidth:520,margin:"0 auto",padding:"14px 14px 100px"}}>
      ${!logging&&!detail&&html`<${Fragment}>
        <div style=${{background:"#111113",border:"1px solid #1e1e22",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style=${{fontSize:10,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace"}}>This Week</span>
            <span style=${{fontSize:11,color:"#f59e0b",fontWeight:700}}>${week.length} sessions</span>
          </div>
          <${WeekStrip} workouts=${workouts}/>
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          <${StatCard} label="Avg RPE" value=${avgRpe} sub="this week" accent=${avgRpe!=="—"?rpeColor(+avgRpe):"#f59e0b"}/>
          <${StatCard} label="Sessions" value=${week.length} sub="Mon–today" accent="#3b82f6"/>
          <${StatCard} label="Volume" value=${vol7>0?(vol7/1000).toFixed(0)+"K":"—"} sub="lbs (7d)" accent="#8b5cf6"/>
        </div>
      <//>` }

      ${!logging&&!detail&&html`
        <div style=${{display:"flex",gap:5,marginBottom:16,background:"#111113",padding:4,borderRadius:10,border:"1px solid #1e1e22"}}>
          ${NAV.map(([v,l])=>html`<button key=${v} onClick=${()=>setView(v)} style=${{flex:1,padding:"8px 4px",border:"none",borderRadius:7,cursor:"pointer",background:view===v?"#f59e0b":"transparent",color:view===v?"#000":"#6b7280",fontWeight:800,fontSize:11}}>${l}</button>`)}
        </div>`}

      ${detail&&!logging&&html`<${DetailView} workout=${detail} onBack=${()=>setDetail(null)}/>`}
      ${logging&&html`<${LogForm} onSave=${handleSave} onCancel=${()=>setLogging(false)}/>`}

      ${!logging&&!detail&&view==="log"&&html`<div style=${{display:"flex",flexDirection:"column",gap:10}}>
        ${sorted.map(w=>html`<${WorkoutCard} key=${w.id} workout=${w} onClick=${setDetail}/>`)}
      </div>`}

      ${!logging&&!detail&&view==="prs"&&html`<div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:12}}>Personal Records</div>
        <${PRBoard}/>
      </div>`}

      ${!logging&&!detail&&view==="load"&&html`<${MuscularLoad} workouts=${workouts}/>`}

      ${!logging&&!detail&&view==="moves"&&html`<div>
        <div style=${{fontSize:9,color:"#6b7280",letterSpacing:2,textTransform:"uppercase",fontFamily:"monospace",marginBottom:12}}>Movement Library</div>
        ${Object.entries(MOVEMENTS).map(([cat,moves])=>html`<div key=${cat} style=${{marginBottom:18}}>
          <div style=${{fontSize:10,fontWeight:800,color:"#f59e0b",marginBottom:7,letterSpacing:1}}>${cat.toUpperCase()}</div>
          <div style=${{display:"flex",flexWrap:"wrap",gap:5}}>
            ${moves.map(m=>{const pr=INITIAL_PRS[m];return html`<div key=${m} style=${{padding:"5px 10px",background:"#111113",border:"1px solid #1e1e22",borderRadius:7,fontSize:12,color:pr?"#f5f5f5":"#4b5563",display:"flex",alignItems:"center",gap:5}}>
              ${m}${pr&&html`<span style=${{fontSize:9,color:"#f59e0b",fontFamily:"monospace",fontWeight:700}}>${pr.weight?pr.weight+"lb":pr.note}</span>`}
            </div>`;}) }
          </div>
        </div>`)}
      </div>`}
    </div>
    <div style=${{height:"env(safe-area-inset-bottom)"}}/>
  </div>`;
}

createRoot(document.getElementById('root')).render(createElement(App,null));

if('serviceWorker'in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
